<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Akıllı Tedarik Sistemi</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #F0CCDF;
        }

        .navbar {
            background-color: #480607;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            font-size: 22px;
        }

        .navbar p {
            font-size: 14px;
            opacity: 0.9;
        }

        .hero {
            background-color: #480607;
            color: white;
            padding: 60px 50px;
        }

        .hero h1 {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .hero p {
            width: 60%;
            line-height: 1.7;
            font-size: 20px;
        }

        .content {
            padding: 50px;
        }

        .section-title {
            margin-bottom: 30px;
            color: #480607;
            font-size: 38px;
        }

        .form-card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 50px;
        }

        .form-card h2 {
            margin-bottom: 25px;
            color: #480607;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            background-color: #480607;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #480607;
        }

        .products-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .product-card {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card h2 {
            margin-bottom: 25px;
            color: #480607;
        }

        .product-info {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .price {
            color: #2048c7;
            font-weight: bold;
        }

        .stock-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .low-stock {
            background-color: #ffd6d6;
            color: #b30000;
        }

        .normal-stock {
            background-color: #d6ecff;
            color: #004c8c;
        }

        footer {
            background-color: #480607;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>Akıllı Tedarik ve Lojistik Yönetim Sistemi</h1>

    <div style="margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 8px; display: inline-block;">
        <strong th:text="'Aktif Kullanıcı: ' + ${currentUser.username}"></strong>
        <span th:text="'(Rol: ' + ${currentUser.role} + ')'" style="margin-left: 10px; opacity: 0.8;"></span>
    </div>
</div>

<div class="content" th:if="${currentUser != null and currentUser.canManageStock()}">
    <h2 class="section-title">Yeni Ürün Ekle</h2>

    <div class="form-card">
        <form action="/add-product" method="post">

            <div class="form-group">
                <label>Ürün Adı</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Fiyat</label>
                <input type="number" step="0.1" name="price" required>
            </div>

            <div class="form-group">
                <label>Stok</label>
                <input type="number" name="stock" required>
            </div>

            <button type="submit" class="btn">Ürün Ekle</button>

        </form>
    </div>
</div>

<div class="content">
    <h2 class="section-title">Ürün Listesi</h2>

    <div class="products-container">

        <div class="product-card" th:each="product : ${products}">

            <h2 th:text="${product.name}">Ürün Adı</h2>

            <div class="product-info">
                Fiyat:
                <span class="price" th:text="${product.price}"></span>
                TL
            </div>

            <div class="product-info">
                Stok:
                <span class="stock-badge"
                      th:text="${product.stock}"
                      th:classappend="${product.stock < 10} ? ' low-stock' : ' normal-stock'">
                </span>
            </div>

        </div>

    </div>
</div>

<div class="content">
    <h2 class="section-title">Siparişler</h2>

    <div class="products-container">

        <div class="product-card" th:each="order : ${orders}">

            <h2>Sipariş #<span th:text="${order.id}"></span></h2>

            <div class="product-info">
                Ürün:
                <strong th:text="${order.product.name}"></strong>
            </div>

            <div class="product-info">
                Adet:
                <strong th:text="${order.quantity}"></strong>
            </div>

            <div class="product-info">
                Durum:
                <span class="stock-badge normal-stock" th:text="${order.state.stateName}"></span>
            </div>

            <form action="/approve-order"
                  method="post"
                  th:if="${order.state.stateName == 'Beklemede' and currentUser.canManageStock()}">

                <input type="hidden" name="orderId" th:value="${order.id}">
                <button type="submit" class="btn" style="width: 100%;">Siparişi Onayla</button>

            </form>

        </div>

    </div>
</div>

<footer>
    Zeynep Yılmaz - Nesneye Dayalı Analiz ve Tasarım Projesi
</footer>

</body>
</html>
